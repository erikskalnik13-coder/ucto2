name: Build Android APK

on:
  push:
    branches: [ "main" ] # Spustí se při pushi do větve main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Přidání oprávnění pro gradlew
        run: chmod +x gradlew

      - name: Sestavení APK (Debug verze)
        run: ./gradlew assembleDebug

      - name: Nahrání APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
